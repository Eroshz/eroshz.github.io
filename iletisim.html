<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eroshz - İletişim</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }

      /* AKILLI NEON LOADER OVERLAY */
      #page-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(9, 8, 14, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.2s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.2s;
        visibility: visible;
        opacity: 1;
        will-change: opacity, visibility;
      }
      #page-loader.fade-out {
        opacity: 0;
        visibility: hidden;
      }
      .spinner {
        width: 46px;
        height: 46px;
        border: 3px solid rgba(109, 40, 217, 0.08);
        border-top-color: #a78bfa;
        border-right-color: #6d28d9;
        border-radius: 50%;
        animation: spin 0.55s cubic-bezier(0.5, 0.1, 0.5, 0.9) infinite;
        box-shadow: 0 0 15px rgba(167, 139, 250, 0.15);
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .contact-card {
        max-width: 480px;
        width: 100%;
        padding: 40px !important;
      }
      .modern-field {
        margin-bottom: 20px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .modern-field input,
      .modern-field textarea {
        width: 100% !important;
        padding: 14px !important;
        display: block;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(109, 40, 217, 0.15);
        border-radius: 10px;
        color: #fff;
        font-family: inherit;
        box-sizing: border-box;
        transition: border-color 0.2s, background 0.2s;
      }
      .modern-field textarea {
        resize: none;
        height: 120px;
      }
      .modern-field input:focus,
      .modern-field textarea:focus {
        border-color: #a78bfa;
        outline: none;
        background: rgba(109, 40, 217, 0.05);
      }

      /* POPUP GELİŞTİRMELERİ */
      .custom-popup-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(9, 8, 14, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 10000;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.3s;
      }
      .custom-popup-overlay.active {
        opacity: 1;
        visibility: visible;
      }
      .custom-popup-box {
        background: #0f0e17;
        border: 1px solid rgba(167, 139, 250, 0.3);
        padding: 35px;
        border-radius: 20px;
        max-width: 400px;
        width: 100%;
        text-align: center;
        transform: scale(0.9);
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
      }
      .custom-popup-overlay.active .custom-popup-box {
        transform: scale(1);
      }
      .popup-icon-wrapper {
        width: 65px;
        height: 65px;
        background: rgba(167, 139, 250, 0.1);
        color: #a78bfa;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 1.8rem;
        margin: 0 auto 20px auto;
      }

      /* Buton Kilitliyken Gövde Stili */
      .action-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
    </style>
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"
    ></script>
    <script type="text/javascript">
      (function () {
        emailjs.init("1V3wqr2OgahKBg2FF");
      })();
    </script>
  </head>
  <body>
    <div id="page-loader"><div class="spinner"></div></div>
    <div class="glow-orb"></div>

    <div class="custom-popup-overlay" id="successPopup">
      <div class="custom-popup-box">
        <div class="popup-icon-wrapper"><i class="fa-solid fa-bolt"></i></div>
        <h3 style="font-size: 1.4rem; color: #fff; margin-bottom: 10px">
          Mesaj Gönderildi!
        </h3>
        <p
          style="
            color: #9ca3af;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 25px;
          "
        >
          Mesajınız başarıyla iletildi. En kısa sürede e-posta adresiniz
          üzerinden geri dönüş sağlanacaktır.
        </p>
        <button
          class="action-btn"
          onclick="closePopup()"
          style="padding: 12px 30px; width: auto"
        >
          Tamamdır
        </button>
      </div>
    </div>

    <div class="modern-card contact-card">
      <div style="text-align: center; margin-bottom: 25px">
        <i
          class="fa-solid fa-paper-plane"
          style="font-size: 2.2rem; color: #a78bfa; margin-bottom: 12px"
        ></i>
        <h2>Mesaj Bırakın</h2>
      </div>

      <form id="contactForm" onsubmit="sendMessage(event)">
        <div class="modern-field">
          <label>Adınız</label><input type="text" id="senderName" required />
        </div>
        <div class="modern-field">
          <label>E-Posta Adresiniz</label
          ><input type="email" id="senderEmail" required />
        </div>
        <div class="modern-field">
          <label>Mesajınız</label
          ><textarea id="senderMessage" required></textarea>
        </div>
        <button
          type="submit"
          id="sendBtn"
          class="action-btn"
          style="padding: 14px"
        >
          Mesajı Gönder
        </button>
        <a
          href="index.html"
          style="
            display: block;
            text-align: center;
            color: #6b7280;
            font-size: 0.85rem;
            margin-top: 15px;
            text-decoration: none;
          "
          ><i class="fa-solid fa-arrow-left"></i> Vitrine Dön</a
        >
      </form>
    </div>

    <script>
      // Sayfa yüklenince loader'ı anında kaldır
      window.addEventListener("DOMContentLoaded", () => {
        const loader = document.getElementById("page-loader");
        loader.classList.add("fade-out");
      });

      function showPopup() {
        document.getElementById("successPopup").classList.add("active");
      }
      function closePopup() {
        document.getElementById("successPopup").classList.remove("active");
      }

      function sendMessage(e) {
        e.preventDefault();
        const name = document.getElementById("senderName").value.trim();
        const email = document.getElementById("senderEmail").value.trim();
        const message = document.getElementById("senderMessage").value.trim();
        const dateStr = new Date().toLocaleString("tr-TR");
        const btn = document.getElementById("sendBtn");

        btn.innerText = "Gönderiliyor...";
        btn.disabled = true;

        const newMessage = {
          id: "msg-" + Date.now(),
          name,
          email,
          message,
          date: dateStr,
        };

        // Admin panelindeki loadStats yapısıyla eşleşmesi için "contactMessages" yapıldı
        let inbox = JSON.parse(localStorage.getItem("contactMessages")) || [];
        inbox.push(newMessage);
        localStorage.setItem("contactMessages", JSON.stringify(inbox));

        const templateParams = {
          from_name: name,
          from_email: email,
          message: message,
          date: dateStr,
        };

        emailjs
          .send("service_46n3pbl", "template_orhbr6a", templateParams)
          .then(
            function () {
              document.getElementById("contactForm").reset();
              showPopup();
            },
            function (error) {
              alert("Sistem kaydı başarılı fakat mail gönderilemedi.");
            }
          )
          .finally(() => {
            btn.innerText = "Mesajı Gönder";
            btn.disabled = false;
          });
      }
    </script>
  </body>
</html>
