<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eroshz - Admin Paneli</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        display: block !important;
        padding: 30px 20px;
        max-width: 900px;
        margin: 0 auto !important;
      }

      /* YÜKLENİYOR EKRANI */
      .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(9, 8, 14, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        z-index: 10000;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: opacity 0.2s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.2s;
        visibility: visible;
        opacity: 1;
        will-change: opacity, visibility;
      }
      .loading-overlay.fade-out {
        opacity: 0;
        visibility: hidden;
      }

      .spinner {
        width: 46px;
        height: 46px;
        border: 3px solid rgba(109, 40, 217, 0.08);
        border-top-color: #a78bfa;
        border-right-color: #6d28d9;
        border-radius: 50%;
        animation: fastSpin 0.55s cubic-bezier(0.5, 0.1, 0.5, 0.9) infinite;
        box-shadow: 0 0 15px rgba(167, 139, 250, 0.15);
      }
      @keyframes fastSpin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* GİRİŞ EKRANI VE GEÇİŞ ANİMASYONLARI */
      .isolated-auth-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at center, #151026 0%, #09080e 100%);
        z-index: 999;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1),
          opacity 0.5s ease;
        will-change: transform, opacity;
      }
      /* Şifre doğruysa tetiklenecek çıkış efekti (Yukarı kayarak silinme) */
      .isolated-auth-screen.slide-up {
        transform: translateY(-100%);
        opacity: 0;
      }

      .auth-box-modern {
        background: #0f0e17;
        border: 1px solid rgba(109, 40, 217, 0.3);
        padding: 40px;
        border-radius: 20px;
        max-width: 420px;
        width: 100%;
        text-align: center;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      }
      .pass-input-wrapper {
        position: relative;
        margin: 20px 0;
      }
      .pass-input-wrapper input {
        width: 100% !important;
        padding: 14px 45px 14px 15px !important;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        color: #fff;
        font-size: 1rem;
        text-align: left;
        box-sizing: border-box;
      }
      .pass-input-wrapper input:focus {
        border-color: #a78bfa;
        outline: none;
      }
      .toggle-password {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #6b7280;
        cursor: pointer;
      }

      .fixed-btn {
        display: inline-flex !important;
        align-items: center !important;
        justify-content: center !important;
        width: 100% !important;
        padding: 14px 20px !important;
        background: #6d28d9 !important;
        border: none !important;
        border-radius: 10px !important;
        color: #fff !important;
        font-size: 1rem !important;
        font-weight: 600 !important;
        cursor: pointer !important;
        text-decoration: none !important;
        transition: background 0.15s;
        height: auto !important;
        line-height: 1.2 !important;
        box-sizing: border-box !important;
      }
      .fixed-btn:hover {
        background: #5b21b6 !important;
      }

      /* PANEL İÇERİK GİRİŞ ANİMASYONU */
      #panelWrapper {
        opacity: 0;
        transform: scale(0.98);
        transition: opacity 0.6s ease,
          transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        will-change: opacity, transform;
      }
      #panelWrapper.fade-in {
        opacity: 1;
        transform: scale(1);
      }

      .panel-top-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 35px;
        padding: 15px 25px;
        background: #0f0e17;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.02);
      }
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        margin-bottom: 40px;
      }
      .stat-card-new {
        background: #0f0e17;
        border-left: 4px solid #6d28d9;
        border-radius: 12px;
        padding: 22px;
      }

      .menu-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
      }
      .menu-card {
        background: #0f0e17;
        border: 1px solid rgba(255, 255, 255, 0.02);
        padding: 25px;
        border-radius: 16px;
        text-align: center;
        text-decoration: none;
        color: #fff;
        transition: transform 0.2s, border-color 0.2s, background 0.2s;
        display: block;
        position: relative;
      }
      .menu-card:hover {
        transform: translateY(-3px);
        border-color: #a78bfa;
        background: rgba(109, 40, 217, 0.03);
      }
      .menu-card i {
        font-size: 2rem;
        margin-bottom: 12px;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>

    <div class="isolated-auth-screen" id="loginWrapper">
      <div class="auth-box-modern">
        <i
          class="fa-solid fa-shield-halved"
          style="font-size: 2.5rem; color: #a78bfa"
        ></i>
        <h2 style="margin-top: 15px; font-size: 1.5rem; font-weight: 700">
          Yönetici Girişi
        </h2>
        <p style="color: #6b7280; font-size: 0.85rem; margin-top: 5px">
          Devam etmek için güvenli parolayı girin
        </p>

        <div class="pass-input-wrapper">
          <input type="password" id="adminPassword" placeholder="Parola" />
          <i
            class="fa-solid fa-eye toggle-password"
            onclick="togglePassVisibility()"
          ></i>
        </div>

        <button class="fixed-btn" onclick="verifyPassword()">Giriş Yap</button>
        <a
          href="index.html"
          style="
            display: block;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #6b7280;
            text-decoration: none;
          "
          ><i class="fa-solid fa-arrow-left"></i> Anasayfaya Geri Dön</a
        >
      </div>
    </div>

    <div id="panelWrapper" style="display: none">
      <header class="panel-top-nav">
        <div style="display: flex; align-items: center; gap: 12px">
          <i
            class="fa-solid fa-sliders"
            style="color: #a78bfa; font-size: 1.4rem"
          ></i>
          <h2 style="font-size: 1.3rem; font-weight: 700">Admin Paneli</h2>
        </div>
        <button
          onclick="logout()"
          style="
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
          "
        >
          <i class="fa-solid fa-power-off"></i> Çıkış Yap
        </button>
      </header>

      <section class="stats-grid">
        <div class="stat-card-new">
          <h4>Projeler</h4>
          <p
            id="statTotal"
            style="font-size: 1.4rem; font-weight: 700; margin-top: 5px"
          >
            0
          </p>
        </div>
        <div class="stat-card-new" style="border-left-color: #3b82f6">
          <h4>Toplam Tıklanma</h4>
          <p
            id="statClicks"
            style="font-size: 1.4rem; font-weight: 700; margin-top: 5px"
          >
            0
          </p>
        </div>
      </section>

      <nav class="menu-grid">
        <a
          href="admin-projeler.html"
          class="menu-card"
          onclick="showLoader(event)"
        >
          <i class="fa-solid fa-folder-tree" style="color: #a78bfa"></i>
          <h3>Projeleri Yönet</h3>
          <p style="color: #6b7280; font-size: 0.85rem; margin-top: 5px">
            Ekle, Düzenle, Sırala
          </p>
        </a>
        <a
          href="admin-mesajlar.html"
          class="menu-card"
          onclick="showLoader(event)"
        >
          <i class="fa-solid fa-envelope" style="color: #3b82f6"></i>
          <h3>Gelen Mesajlar</h3>
          <p style="color: #6b7280; font-size: 0.85rem; margin-top: 5px">
            İletişim Mesajları
          </p>
        </a>
      </nav>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        hideLoader();

        // Eğer kullanıcı zaten giriş yaptıysa animasyonsuz direkt göster
        if (sessionStorage.getItem("adminAuth") === "true") {
          document.getElementById("loginWrapper").style.display = "none";
          const panel = document.getElementById("panelWrapper");
          panel.style.display = "block";
          panel.classList.add("fade-in");
          loadStats();
        }
      });

      function hideLoader() {
        const overlay = document.getElementById("loadingOverlay");
        overlay.classList.add("fade-out");
      }

      function showLoader(e) {
        e.preventDefault();
        const targetUrl = e.currentTarget.getAttribute("href");
        const overlay = document.getElementById("loadingOverlay");

        overlay.classList.remove("fade-out");

        requestAnimationFrame(() => {
          setTimeout(() => {
            window.location.href = targetUrl;
          }, 60);
        });

        setTimeout(hideLoader, 4000);
      }

      function togglePassVisibility() {
        const input = document.getElementById("adminPassword");
        const icon = document.querySelector(".toggle-password");
        if (input.type === "password") {
          input.type = "text";
          icon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
          input.type = "password";
          icon.classList.replace("fa-eye-slash", "fa-eye");
        }
      }

      function verifyPassword() {
        if (
          document.getElementById("adminPassword").value.trim() === "Cedi2121"
        ) {
          sessionStorage.setItem("adminAuth", "true");

          const loginScreen = document.getElementById("loginWrapper");
          const panelWrapper = document.getElementById("panelWrapper");

          // 1. Giriş ekranını yukarı doğru kaydır
          loginScreen.classList.add("slide-up");

          // 2. Paneli görünür yap ama opaklığını sıfır tut (Display block tetiklensin)
          panelWrapper.style.display = "block";
          loadStats();

          // 3. Tarayıcının render zamanlamasına göre paneli yumuşakça içeri al
          setTimeout(() => {
            panelWrapper.classList.add("fade-in");
          }, 150);

          // 4. Animasyon bittikten sonra login elementini DOM'da gizle
          setTimeout(() => {
            loginScreen.style.display = "none";
          }, 500);
        } else {
          alert("Şifre Hatalı!");
        }
      }

      function logout() {
        sessionStorage.removeItem("adminAuth");
        window.location.href = "index.html";
      }

      function loadStats() {
        const customSites =
          JSON.parse(localStorage.getItem("customSites")) || [];
        const totalClicks = customSites.reduce(
          (sum, s) => sum + (s.clicks || 0),
          0
        );

        document.getElementById("statTotal").innerText = customSites.length;
        document.getElementById("statClicks").innerText = totalClicks;
      }
    </script>
  </body>
</html>
