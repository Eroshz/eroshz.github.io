<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eroshz - Kontrol Merkezi</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      /* CSS dosyasındaki çakışmaları ezen kesin tasarım ayarları */
      body {
        display: block !important;
        padding: 40px 20px;
        max-width: 1100px;
        margin: 0 auto !important;
      }
      .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
      }
      .auth-card {
        max-width: 420px;
        width: 100%;
        padding: 30px !important;
      }
      .input-wrapper-modern {
        position: relative;
        margin-bottom: 15px;
        width: 100%;
      }
      .input-wrapper-modern input {
        width: 100% !important;
        padding: 14px 14px 14px 40px !important;
        display: block;
      }
      .input-wrapper-modern .input-icon {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #a78bfa;
      }
      .auth-actions-group {
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 100%;
      }
      .back-link-secondary {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        padding: 12px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        background: rgba(255, 255, 255, 0.01);
        border-radius: 10px;
        text-decoration: none;
        color: #9ca3af !important;
        font-size: 0.9rem;
      }
      .panel-container {
        width: 100%;
        margin-top: 20px;
      }
      .panel-top-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        padding-bottom: 15px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }
      .exit-btn {
        text-decoration: none;
        color: #ef4444;
        padding: 8px 16px;
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 8px;
      }
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }
      .stat-card {
        background: #0f0e17;
        border: 1px solid rgba(109, 40, 217, 0.15);
        border-radius: 14px;
        padding: 20px;
        display: flex;
        align-items: center;
        gap: 15px;
      }
      .stat-icon {
        font-size: 1.5rem;
        color: #a78bfa;
      }
      .stat-info h4 {
        font-size: 0.8rem;
        color: #9ca3af;
        margin: 0;
      }
      .stat-info p {
        font-size: 1.4rem;
        font-weight: 700;
        color: #fff;
        margin: 2px 0 0 0;
      }

      .dashboard-layout {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 25px;
        align-items: start;
      }
      .modern-field {
        margin-bottom: 15px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .modern-field input,
      .modern-field select {
        width: 100% !important;
        padding: 12px !important;
        display: block;
      }
      .modern-delete-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px;
        background: #09080e;
        border-radius: 10px;
        margin-bottom: 10px;
        border: 1px solid rgba(255, 255, 255, 0.02);
      }
      .item-meta {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .click-badge {
        background: rgba(109, 40, 217, 0.2);
        color: #c084fc;
        padding: 2px 8px;
        border-radius: 20px;
        font-size: 0.75rem;
        margin-left: 5px;
      }
      .delete-icon-btn {
        background: none;
        border: none;
        color: #ef4444;
        cursor: pointer;
        font-size: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="glow-orb"></div>

    <!-- GİRİŞ MERKEZİ -->
    <div class="auth-container" id="loginWrapper">
      <div class="modern-card auth-card">
        <div
          class="auth-header"
          style="text-align: center; margin-bottom: 15px"
        >
          <i
            class="fa-solid fa-shield-halved"
            style="font-size: 2rem; color: #a78bfa; margin-bottom: 10px"
          ></i>
          <h2 style="font-size: 1.5rem; margin-bottom: 5px">
            Erişim Yetkilendirme
          </h2>
          <p style="color: #9ca3af; font-size: 0.9rem">
            Devam etmek için yönetici anahtarını girin.
          </p>
        </div>
        <div class="input-wrapper-modern">
          <i class="fa-solid fa-key input-icon"></i>
          <input
            type="password"
            id="adminPassword"
            placeholder="Yönetici Şifresi"
            required
          />
        </div>
        <div class="auth-actions-group">
          <button
            class="action-btn"
            style="padding: 14px"
            onclick="verifyPassword()"
          >
            Sisteme Giriş Yap
          </button>
          <a href="index.html" class="back-link-secondary"
            ><i class="fa-solid fa-circle-arrow-left"></i> Vitrine Dön</a
          >
        </div>
      </div>
    </div>

    <!-- YÖNETİM PANELİ -->
    <div class="panel-container d-none" id="panelWrapper">
      <header class="panel-top-nav">
        <div
          class="panel-branding"
          style="display: flex; align-items: center; gap: 10px"
        >
          <i
            class="fa-solid fa-sliders"
            style="color: #a78bfa; font-size: 1.3rem"
          ></i>
          <h2 style="font-size: 1.4rem">Kontrol Merkezi</h2>
        </div>
        <a href="index.html" class="exit-btn"
          ><i class="fa-solid fa-door-open"></i> Paneli Kapat</a
        >
      </header>

      <!-- GERÇEK TIKLAMA İSTATİSTİKLERİ -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon"><i class="fa-solid fa-layer-group"></i></div>
          <div class="stat-info">
            <h4>Toplam Proje</h4>
            <p id="statTotal">0</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><i class="fa-solid fa-chart-line"></i></div>
          <div class="stat-info">
            <h4>Toplam Tıklanma</h4>
            <p id="statClicks">0</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><i class="fa-solid fa-circle-nodes"></i></div>
          <div class="stat-info">
            <h4>Sistem Bağlantısı</h4>
            <p style="color: #10b981; font-size: 1.1rem; font-weight: 600">
              Çevrimiçi
            </p>
          </div>
        </div>
      </div>

      <div class="dashboard-layout">
        <!-- Sol Blok: Ekleme Formu -->
        <div class="modern-card">
          <h3 style="font-size: 1.1rem; margin-bottom: 20px">
            <i
              class="fa-solid fa-circle-plus"
              style="color: #a78bfa; margin-right: 8px"
            ></i
            >Yeni Proje Entegre Et
          </h3>
          <form id="addSiteForm" onsubmit="addNewSite(event)">
            <div class="modern-field">
              <label>Proje Adı</label>
              <input
                type="text"
                id="siteName"
                placeholder="Örn: TransferInsider"
                required
              />
            </div>
            <div class="modern-field">
              <label>Canlı Yayın URL</label>
              <input
                type="url"
                id="siteUrl"
                placeholder="https://..."
                required
              />
            </div>
            <div class="modern-field">
              <label>Sembol / İkon</label>
              <select id="siteIcon">
                <option value="fa-soccer-ball">⚽ Futbol</option>
                <option value="fa-music">🎵 Müzik</option>
                <option value="fa-headset">🎧 Kulaklık</option>
                <option value="fa-gamepad">🎮 Oyun Dünyası</option>
                <option value="fa-code">💻 Kodlama / Yazılım</option>
                <option value="fa-bolt">⚡ Performans / Hız</option>
                <option value="fa-chart-simple">📊 Analiz / Panel</option>
              </select>
            </div>
            <div class="modern-field">
              <label>Vurgu Rengi</label>
              <input
                type="color"
                id="siteColor"
                value="#a78bfa"
                style="height: 40px; padding: 2px !important; cursor: pointer"
              />
            </div>
            <button
              type="submit"
              class="action-btn"
              style="padding: 12px; margin-top: 10px"
            >
              Proje Kartını Oluştur
            </button>
          </form>
        </div>

        <!-- Sağ Blok: Yönetim Listesi -->
        <div class="modern-card">
          <h3 style="font-size: 1.1rem; margin-bottom: 20px">
            <i
              class="fa-solid fa-list-check"
              style="color: #a78bfa; margin-right: 8px"
            ></i
            >Aktif Portföy Öğeleri
          </h3>
          <div id="deleteList"></div>
        </div>
      </div>
    </div>

    <script>
      function verifyPassword() {
        const passInput = document.getElementById("adminPassword");
        if (passInput.value.trim() === "Cedi2121") {
          document.getElementById("loginWrapper").style.display = "none";
          document.getElementById("panelWrapper").classList.remove("d-none");
          renderAdminList();
        } else {
          alert("Erişim Reddedildi: Hatalı Şifre!");
          passInput.value = "";
          passInput.focus();
        }
      }

      function renderAdminList() {
        let customSites = JSON.parse(localStorage.getItem("customSites")) || [];
        if (!Array.isArray(customSites)) customSites = [];

        // Tıklama istatistiklerini hesapla
        let totalClicks = 0;
        customSites.forEach((s) => (totalClicks += s.clicks || 0));

        document.getElementById("statTotal").innerText = customSites.length;
        document.getElementById("statClicks").innerText = totalClicks;

        const deleteList = document.getElementById("deleteList");
        deleteList.innerHTML = "";

        if (customSites.length === 0) {
          deleteList.innerHTML =
            '<p style="color:#6b7280; text-align:center; padding:20px;">Kayıtlı proje bulunamadı.</p>';
          return;
        }

        customSites.forEach((site) => {
          const clickCount = site.clicks || 0;
          deleteList.innerHTML += `
                    <div class="modern-delete-item">
                        <div class="item-meta">
                            <i class="fa-solid ${site.icon}" style="color:${site.color};"></i>
                            <span style="font-weight:500;">${site.name}</span>
                            <span class="click-badge">${clickCount} Tık</span>
                        </div>
                        <button onclick="deleteSite('${site.id}')" class="delete-icon-btn"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                `;
        });
      }

      function addNewSite(e) {
        e.preventDefault();
        const name = document.getElementById("siteName").value.trim();
        const url = document.getElementById("siteUrl").value.trim();
        const icon = document.getElementById("siteIcon").value;
        const color = document.getElementById("siteColor").value;

        const newSite = {
          id: "custom-" + Date.now(),
          name,
          url,
          icon,
          color,
          clicks: 0,
        };

        let customSites = JSON.parse(localStorage.getItem("customSites")) || [];
        customSites.push(newSite);
        localStorage.setItem("customSites", JSON.stringify(customSites));

        document.getElementById("addSiteForm").reset();
        document.getElementById("siteColor").value = "#a78bfa";
        renderAdminList();
      }

      function deleteSite(id) {
        if (confirm("Bu projeyi kaldırmak istediğinize emin misiniz?")) {
          let customSites =
            JSON.parse(localStorage.getItem("customSites")) || [];
          customSites = customSites.filter((site) => site.id !== id);
          localStorage.setItem("customSites", JSON.stringify(customSites));
          renderAdminList();
        }
      }
    </script>
  </body>
</html>
