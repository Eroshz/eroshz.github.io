<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eroshz - Proje Yönetimi</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        display: block !important;
        padding: 30px 20px;
        max-width: 1100px;
        margin: 0 auto !important;
      }
      .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #09080e;
        z-index: 10000;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: opacity 0.3s ease;
      }
      .spinner {
        width: 50px;
        height: 50px;
        border: 5px solid rgba(109, 40, 217, 0.1);
        border-top-color: #6d28d9;
        border-radius: 50%;
        animation: spin 1s infinite linear;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .admin-main-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
      }
      @media (max-width: 768px) {
        .admin-main-grid {
          grid-template-columns: 1fr;
        }
      }
      .modern-field {
        margin-bottom: 15px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .modern-field input,
      .modern-field select {
        width: 100% !important;
        padding: 12px !important;
        display: block;
        background: rgba(255, 255, 255, 0.01);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 8px;
        color: #fff;
        box-sizing: border-box;
      }

      .fixed-action-btn {
        display: inline-flex !important;
        align-items: center !important;
        justify-content: center !important;
        width: 100% !important;
        height: 46px !important;
        padding: 0 20px !important;
        border: none !important;
        border-radius: 8px !important;
        font-size: 0.95rem !important;
        font-weight: 600 !important;
        cursor: pointer !important;
        box-sizing: border-box !important;
        margin-top: 10px;
        text-decoration: none !important;
      }
      .btn-success {
        background: #10b981 !important;
        color: #fff !important;
      }
      .btn-success:hover {
        background: #059669 !important;
      }
      .btn-secondary {
        background: #374151 !important;
        color: #fff !important;
      }

      .panel-list-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px;
        background: #0f0e17;
        border-radius: 12px;
        margin-bottom: 12px;
        border: 1px solid rgba(255, 255, 255, 0.02);
      }
    </style>
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>
    <script>
      if (sessionStorage.getItem("adminAuth") !== "true") {
        window.location.href = "admin.html";
      }
    </script>

    <header
      style="
        display: flex;
        justify-content: space-between;
        margin-bottom: 30px;
        align-items: center;
      "
    >
      <h2>
        <i class="fa-solid fa-folder-tree" style="color: #a78bfa"></i> Proje
        Link Dağıtıcısı
      </h2>
      <a
        href="admin.html"
        onclick="showLoader(event)"
        style="color: #fff; text-decoration: none"
        ><i class="fa-solid fa-arrow-left"></i> Geri Dön</a
      >
    </header>

    <div class="admin-main-grid">
      <div class="modern-card">
        <h3 id="formTitle">Yeni Proje Ekle</h3>
        <form
          id="addSiteForm"
          onsubmit="handleFormSubmit(event)"
          style="margin-top: 15px"
        >
          <input type="hidden" id="editingSiteId" />
          <div class="modern-field">
            <label>Proje İsmi</label
            ><input type="text" id="siteName" required />
          </div>
          <div class="modern-field">
            <label>Açıklama</label
            ><input type="text" id="siteDesc" maxlength="45" />
          </div>
          <div class="modern-field">
            <label>Hedef URL</label><input type="url" id="siteUrl" required />
          </div>
          <div class="modern-field">
            <label>İkon</label>
            <select id="siteIcon">
              <option value="fa-soccer-ball">⚽ Futbol / Spor</option>
              <option value="fa-music">🎵 Müzik / Sanat</option>
              <option value="fa-code">💻 Yazılım / Kodlama</option>
              <option value="fa-gamepad">🎮 Oyun / Simülasyon</option>
            </select>
          </div>
          <div class="modern-field">
            <label>Vurgu Rengi</label
            ><input
              type="color"
              id="siteColor"
              value="#a78bfa"
              style="height: 40px; padding: 2px !important"
            />
          </div>
          <button
            type="submit"
            id="submitBtn"
            class="fixed-action-btn btn-success"
          >
            Listeye Ekle
          </button>
          <button
            type="button"
            id="cancelEditBtn"
            onclick="resetProjectForm()"
            class="fixed-action-btn btn-secondary"
            style="display: none"
          >
            Düzenlemeyi İptal Et
          </button>
        </form>
      </div>

      <div class="modern-card">
        <h3>Aktif Projeler</h3>
        <div id="deleteList" style="margin-top: 15px"></div>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        setTimeout(() => {
          document.getElementById("loadingOverlay").style.opacity = "0";
          setTimeout(
            () =>
              (document.getElementById("loadingOverlay").style.display =
                "none"),
            300
          );
        }, 300);
        renderAdminList();
      });

      function showLoader(e) {
        e.preventDefault();
        const dest = e.currentTarget.getAttribute("href");
        document.getElementById("loadingOverlay").style.display = "flex";
        document.getElementById("loadingOverlay").style.opacity = "1";
        setTimeout(() => (window.location.href = dest), 300);
      }

      function renderAdminList() {
        let customSites = JSON.parse(localStorage.getItem("customSites")) || [];
        const deleteList = document.getElementById("deleteList");
        deleteList.innerHTML =
          customSites.length === 0
            ? '<p style="color:#6b7280;">Kayıt yok.</p>'
            : "";

        customSites.forEach((site, index) => {
          deleteList.innerHTML += `
                    <div class="panel-list-item">
                        <div><b>${site.name}</b></div>
                        <div>
                            <button onclick="editSite('${site.id}')" style="background:none; border:none; color:#3b82f6; cursor:pointer; margin-right:10px;"><i class="fa-solid fa-pen"></i></button>
                            <button onclick="moveOrder(${index}, -1)" style="background:none; border:none; color:#9ca3af; cursor:pointer;"><i class="fa-solid fa-arrow-up"></i></button>
                            <button onclick="moveOrder(${index}, 1)" style="background:none; border:none; color:#9ca3af; cursor:pointer;"><i class="fa-solid fa-arrow-down"></i></button>
                            <button onclick="deleteSite('${site.id}')" style="background:none; border:none; color:#ef4444; cursor:pointer; margin-left:10px;"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>`;
        });
      }

      function handleFormSubmit(e) {
        e.preventDefault();
        let customSites = JSON.parse(localStorage.getItem("customSites")) || [];
        const editId = document.getElementById("editingSiteId").value;

        const projectData = {
          name: document.getElementById("siteName").value.trim(),
          desc: document.getElementById("siteDesc").value.trim(),
          url: document.getElementById("siteUrl").value.trim(),
          icon: document.getElementById("siteIcon").value,
          color: document.getElementById("siteColor").value,
        };

        if (editId) {
          customSites = customSites.map((s) =>
            s.id === editId ? { ...s, ...projectData } : s
          );
        } else {
          customSites.push({
            id: "custom-" + Date.now(),
            ...projectData,
            clicks: 0,
          });
        }

        localStorage.setItem("customSites", JSON.stringify(customSites));
        resetProjectForm();
        renderAdminList();
      }

      function editSite(id) {
        let customSites = JSON.parse(localStorage.getItem("customSites")) || [];
        const site = customSites.find((s) => s.id === id);
        if (!site) return;

        document.getElementById("editingSiteId").value = site.id;
        document.getElementById("siteName").value = site.name;
        document.getElementById("siteDesc").value = site.desc;
        document.getElementById("siteUrl").value = site.url;
        document.getElementById("siteIcon").value = site.icon;
        document.getElementById("siteColor").value = site.color;

        document.getElementById("formTitle").innerText = "Projeyi Düzenle";
        document.getElementById("submitBtn").innerText =
          "Değişiklikleri Kaydet";
        document.getElementById("cancelEditBtn").style.display = "block";
      }

      function resetProjectForm() {
        document.getElementById("addSiteForm").reset();
        document.getElementById("editingSiteId").value = "";
        document.getElementById("formTitle").innerText =
          "Yeni Proje Linki Dağıt";
        document.getElementById("submitBtn").innerText = "Listeye Ekle";
        document.getElementById("cancelEditBtn").style.display = "none";
      }

      function deleteSite(id) {
        let customSites = JSON.parse(localStorage.getItem("customSites")) || [];
        localStorage.setItem(
          "customSites",
          JSON.stringify(customSites.filter((s) => s.id !== id))
        );
        renderAdminList();
      }

      function moveOrder(index, direction) {
        const customSites =
          JSON.parse(localStorage.getItem("customSites")) || [];
        const target = index + direction;
        if (target < 0 || target >= customSites.length) return;
        const temp = customSites[index];
        customSites[index] = customSites[target];
        customSites[target] = temp;
        localStorage.setItem("customSites", JSON.stringify(customSites));
        renderAdminList();
      }
    </script>
  </body>
</html>
